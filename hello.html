<!DOCTYPE html>
<html>
  <head>
    <title>My experiment</title>
    <script src="https://unpkg.com/jspsych@7.3.2"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.2"></script>
    <link href="https://unpkg.com/jspsych@7.3.2/css/jspsych.css" rel="stylesheet" type="text/css" />
    <script src="https://unpkg.com/@jspsych-contrib/plugin-pipe"></script>  //  DataPipe1
  </head>
  <body></body>
  <script>
    const jsPsych = initJsPsych();

    // DataPipe 2
    const subject_id = jsPsych.randomization.randomID(10);
    const filename = `${subject_id}.csv`;

             
    const hello_trial = {
      type: jsPsychHtmlButtonResponse,
      stimulus: 'Hello world!'
       choices: ["次へ"]
    }

    // DataPipe 3 
     const save_data = {
                type: jsPsychPipe,
                action: "save",
                experiment_id: "g0Lhevx5IxlX",
                filename: filename,
                data_string: ()=>jsPsych.data.get().csv()
              };


    jsPsych.run([hello_trial, save_data]);
  </script>
</html>
